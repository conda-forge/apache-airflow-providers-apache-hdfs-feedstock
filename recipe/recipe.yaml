context:
  name: apache-airflow-providers-apache-hdfs
  version: "4.11.5"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/apache_airflow_providers_apache_hdfs-${{ version }}.tar.gz
  sha256: 828ce4d6597ccd6d8e2b4f912af4f97ff2359ad1ca16dcd25ffc1e5938eef2a0

build:
  noarch: python
  script: python -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - flit-core ==3.12.0
  run:
    - python >=${{ python_min }}
    - apache-airflow >=2.11.0
    - apache-airflow-providers-common-compat >=1.12.0
    # more restrictive for python >=3.12
    - python-hdfs >=2.7.3
    # start hdfs[avro,dataframe,kerberos]
    # end hdfs[avro,dataframe,kerberos]
    # more restrictive for python >=3.14
    - fastavro >=1.12.1
    # more restrictive for python >=3.14
    - pandas >=2.3.3

tests:
  - python:
      imports:
        - airflow.providers.apache.hdfs
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/apache/airflow/
  summary: Provider package apache-airflow-providers-apache-hdfs for Apache Airflow
  license: Apache-2.0
  license_file:
    - LICENSE
    - NOTICE
  documentation: https://airflow.apache.org/docs/apache-airflow-providers-apache-hdfs/stable/index.html
  repository: https://github.com/apache/airflow/

extra:
  recipe-maintainers:
    - xylar
